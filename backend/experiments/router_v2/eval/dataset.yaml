# ============================================================================
# Held-out routing eval set. Phrasings are intentionally DIFFERENT from
# routes.yaml utterances and intents.yaml keywords (we test generalization, not
# memorization — run_compare.py --check fails if overlap is high).
#
# Per case: query · intent (gold) · intent_alt (acceptable alternates) ·
#           tier (ideal) · min_tier (hard floor for soft scoring).
# Tiers reflect DIFFICULTY on purpose (same intent, different difficulty → different
# ideal tier) — that's exactly what the candidate should get right and the baseline can't.
# ============================================================================
version: 1
cases:
  - {id: ev-001, query: "add a helper that returns the larger of two integers", intent: code_generation, tier: fast, min_tier: fast}
