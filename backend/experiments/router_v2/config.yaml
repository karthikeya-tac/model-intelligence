# ============================================================================
# router_v2 experiment — policy knobs (config-as-code).
# These are POLICY parameters (like the live selection.yaml's quality_tie_epsilon),
# tuned by eval/run_compare.py --sweep. They are NOT fabricated facts about models —
# all model quality comes from the real capability_scores in models.yaml.
# ============================================================================

# ---- difficulty: computed from the QUERY TEXT (features.py), 0..1 ----
difficulty:
  # weights over normalized query signals (sum ~= 1.0)
  weights:
    length: 0.15
    multistep: 0.25
    constraints: 0.20
    code: 0.10
    math: 0.10
    ambiguity: 0.20
  length_saturation_tokens: 600     # tokens at which the length signal saturates to 1.0
  multistep_saturation: 3
  constraint_saturation: 3
  # difficulty -> integer delta applied to the intent's complexity prior
  # bands are [upper_bound, delta]; first band whose bound > difficulty wins; else delta_high
  delta_bands: [[0.25, -1], [0.65, 0], [0.85, 1]]
  delta_high: 2

# effective_complexity (1..5) -> base tier
complexity_tier_map: {1: fast, 2: fast, 3: standard, 4: powerful, 5: powerful}
allow_demote: false   # difficulty may RAISE tier above intent.default_tier, never lower it

# ---- Level-1 classification ----
classifier:
  semantic:
    enabled: true
    model: sentence-transformers/all-MiniLM-L6-v2
    temperature: 0.08       # softmax temperature for cosine -> confidence
    sim_floor: 0.25         # below this top cosine, treat as OOD -> keyword fallback
    margin: 0.04            # min cosine gap top1-top2 to trust the top intent
    top_k: 3
    secondary_margin: 0.20  # fold a secondary intent into L2 if within this confidence of the top
    low_confidence: 0.28    # softmax over ~19 intents runs low; escalate only when genuinely flat
  keyword:
    base_confidence: 0.5    # confidence when only the keyword fallback matched

# ---- uncertainty gate ----
# Escalate ONLY when the classifier is genuinely unsure which intent it is. Difficulty already
# sets the tier (difficulty.py), so the difficulty-borderline trigger is OFF by default (a high
# band that's effectively unreachable) to avoid pushing easy queries up.
escalation:
  enabled: true
  low_confidence: 0.28
  borderline_difficulty: [1.10, 1.20]   # effectively disabled; confidence is the trigger
  raise_by: 1                            # bump tier by N (capped by limit rules + powerful)
  widen_pool: true                       # also consider the next tier up as a failover candidate

# ---- stretch: model-strength embedding channel (OFF by default) ----
# Grounded ONLY in each model's real `description` + a templated rendering of its real
# capability_scores. Never invented prose. quality = (1-lambda)*blend + lambda*profile_cosine.
profile_channel:
  lambda: 0.0

# ---- Level-2 multi-dimension capability map (intent -> {dimension: weight}) ----
# Dimensions are the REAL capability_scores keys in models.yaml. Weights are policy.
intent_dimensions:
  code_generation: {code_generation: 0.8, reasoning: 0.2}
  code_review: {code_review: 0.7, reasoning: 0.2, security_analysis: 0.1}
  code_formatting: {code_generation: 1.0}
  code_completion: {code_generation: 1.0}
  architecture_design: {architecture: 0.6, reasoning: 0.4}
  multi_step_planning: {reasoning: 0.7, architecture: 0.3}
  impact_analysis: {reasoning: 0.6, architecture: 0.4}
  math_problem: {math: 0.8, reasoning: 0.2}
  documentation: {documentation: 1.0}
  summarisation: {documentation: 0.7, reasoning: 0.3}
  creative_writing: {documentation: 0.6, reasoning: 0.4}
  security_scanning: {security_analysis: 0.8, code_review: 0.2}
  security_architecture_review: {security_analysis: 0.6, architecture: 0.25, reasoning: 0.15}
  data_analysis: {data_analysis: 0.8, reasoning: 0.2}
  incident_response: {reasoning: 0.5, code_review: 0.3, security_analysis: 0.2}
  factual_qa: {reasoning: 1.0}
  how_to_explanation: {documentation: 0.6, reasoning: 0.4}
  conversational: {reasoning: 1.0}
  translation: {translation: 1.0}
  default: {reasoning: 1.0}

# ---- cost/latency tie-break (mirrors live selection.yaml) ----
quality_tie_epsilon: 0.05
output_weight: 3.0
latency_scores: {fastest: 1.0, faster: 0.85, fast: 0.8, adaptive: 0.6, moderate: 0.5, slower: 0.3, slowest: 0.1}
default_latency_score: 0.5
