# ============================================================================
# selection.yaml — routing policy (config-as-code), Level-1 tier + Level-2 model.
# ----------------------------------------------------------------------------
# QUERY-AWARE + QUALITY-FIRST (no user-selectable profiles):
#   • Level 1: query difficulty (from the text) × intent.complexity → base tier,
#     then rules + min_tier floor + confidence-aware escalation.
#   • Level 2: quality = need-vector · capability_scores / 100, where the need-vector
#     is fused from the top-k intents. Cost then latency only break NEAR-TIES.
# All numbers here are POLICY knobs (like quality_tie_epsilon) — model quality itself
# comes only from the real capability_scores in models.yaml (no fabrication).
# ============================================================================

version: 3

# ---- Level-2 cost/latency tie-break ----
quality_tie_epsilon: 0.05        # models within this capability gap are a tie → cheaper/faster wins
output_weight: 3.0               # blended price = input + output_weight * output (per 1M)
latency_scores:                  # latency_class (models.yaml) -> 0..1 (higher = faster)
  fastest: 1.00
  faster:  0.85
  fast:    0.80
  adaptive: 0.60
  moderate: 0.50
  slower:  0.30
  slowest: 0.10

# ---- Level-1 difficulty (computed from the query in features.py) ----
difficulty:
  weights: {length: 0.15, multistep: 0.25, constraints: 0.20, code: 0.10, math: 0.10, ambiguity: 0.20}
  length_saturation_tokens: 600
  multistep_saturation: 3
  constraint_saturation: 3
  delta_bands: [[0.25, -1], [0.65, 0], [0.85, 1]]   # difficulty -> complexity delta
  delta_high: 2
complexity_tier_map: {1: fast, 2: fast, 3: standard, 4: powerful, 5: powerful}
allow_demote: false              # difficulty may RAISE tier above intent.default_tier, never lower it

# ---- Level-1 classifier (embedding-first; keyword fallback) ----
classifier:
  semantic:
    enabled: true
    model: sentence-transformers/all-MiniLM-L6-v2
    temperature: 0.08            # softmax temperature for cosine -> confidence
    sim_floor: 0.25              # below this top cosine, treat as OOD -> keyword fallback
    margin: 0.04
    top_k: 3
    secondary_margin: 0.20       # fold a secondary intent into L2 if within this confidence of the top
    low_confidence: 0.28         # below this top-intent confidence -> escalate
  keyword:
    base_confidence: 0.5

# ---- confidence-aware escalation ----
escalation:
  enabled: true
  low_confidence: 0.28
  borderline_difficulty: [1.10, 1.20]   # effectively disabled; confidence is the trigger
  raise_by: 1
  widen_pool: true

# ---- Level-2 capability blend: intent -> {dimension: weight} (real capability_scores keys) ----
intent_dimensions:
  code_generation: {code_generation: 0.8, reasoning: 0.2}
  code_review: {code_review: 0.7, reasoning: 0.2, security_analysis: 0.1}
  code_formatting: {code_generation: 1.0}
  code_completion: {code_generation: 1.0}
  architecture_design: {architecture: 0.6, reasoning: 0.4}
  multi_step_planning: {reasoning: 0.7, architecture: 0.3}
  impact_analysis: {reasoning: 0.6, architecture: 0.4}
  math_problem: {math: 0.8, reasoning: 0.2}
  documentation: {documentation: 1.0}
  summarisation: {documentation: 0.7, reasoning: 0.3}
  creative_writing: {documentation: 0.6, reasoning: 0.4}
  security_scanning: {security_analysis: 0.8, code_review: 0.2}
  security_architecture_review: {security_analysis: 0.6, architecture: 0.25, reasoning: 0.15}
  data_analysis: {data_analysis: 0.8, reasoning: 0.2}
  incident_response: {reasoning: 0.5, code_review: 0.3, security_analysis: 0.2}
  factual_qa: {reasoning: 1.0}
  how_to_explanation: {documentation: 0.6, reasoning: 0.4}
  conversational: {reasoning: 1.0}
  translation: {translation: 1.0}
  default: {reasoning: 1.0}

# single-dimension fallback (used only if an intent is missing from intent_dimensions)
intent_capability:
  default: reasoning

constraints:
  allow_standby_as_failover: true
  default_latency_score: 0.5
  long_context_min: 400000
  default_output_tokens: 600
