# ============================================================================
#  niha — models.yaml   (Phase-0 model catalog, config-as-code)
# ----------------------------------------------------------------------------
#  WHAT THIS IS
#    The model registry the routing gateway loads + validates at boot. It holds
#    pointers + policy + tunable controls for every model niha can route to —
#    never model weights. In Phase 1 this file becomes the seed migration for
#    the Postgres registry, so each block maps 1:1 to a future table.
#
#  SOURCE OF TRUTH (this file is generated by hand from these only)
#    Anthropic : "claude model catalog/claude_*.txt"      + claude_control_params.txt
#    OpenAI    : "openai_models/gpt-*.txt"                 + openai_control_params.txt
#    Google    : "gemini_models/gemini-*.txt"             + gemini_control_params.txt
#
#  CONVENTIONS
#    - id                : slug == provider API model name. Immutable natural key.
#    - provider          : slug → an entry in providers.yaml (cross-ref, validated).
#    - pricing           : USD, per 1,000,000 (1M) tokens. Token counts are plain ints.
#    - dates             : ISO (YYYY-MM-DD or YYYY-MM as published by the source).
#    - tier              : fast | standard | powerful          (routing class)
#    - role              : primary | alternative | fallback     (preference within a
#                          (provider, tier); primary = current default pick)
#    - status            : active | preview | standby | deprecated | disabled
#                          standby = callable but superseded → not a default pick.
#    - controls.sampling : tunable | locked  (locked ⇒ temperature/top_p fixed at 1).
#                          The full per-provider parameter vocabulary (ranges,
#                          defaults, tool lists) lives on the provider's
#                          `param_profile` in providers.yaml — not repeated here.
#    - benchmarks.capability_scores : 0–100, the catalog's OWN ESTIMATES derived
#                          from public benchmarks (not official vendor numbers).
#                          Labels (excellent/very_good/…) are omitted — derivable
#                          from the score. `standard` lists only confidently
#                          published results (the source's "(!)" uncertain /
#                          range / Elo-with-units figures are left out).
#    - Anthropic temperature rule: locked for models released AFTER Claude Opus 4.6
#                          (2026-02-05); tunable for Opus 4.6 and earlier (Haiku 4.5).
#
#  ADD A MODEL
#    Copy a sibling entry, set a unique `id`, point `provider` at a providers.yaml
#    id, fill only fields the catalog actually states, and run the validator
#    (see models.schema.json). Unknown keys are rejected.
# ============================================================================

